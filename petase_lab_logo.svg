<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="420" fill="white"/>
<defs>
<linearGradient id="helix-grad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1A7FC4"/>
<stop offset="100%" stop-color="#0FB5A2"/>
</linearGradient>
</defs>

<!-- Background hex grid -->
<g opacity="0.06">
<path d="M240 60L260 48L280 60L280 84L260 96L240 84Z" fill="#1a1a1a"/>
<path d="M280 60L300 48L320 60L320 84L300 96L280 84Z" fill="#1a1a1a"/>
<path d="M260 96L280 84L300 96L300 120L280 132L260 120Z" fill="#1a1a1a"/>
<path d="M320 60L340 48L360 60L360 84L340 96L320 84Z" fill="#1a1a1a"/>
<path d="M300 96L320 84L340 96L340 120L320 132L300 120Z" fill="#1a1a1a"/>
<path d="M340 96L360 84L380 96L380 120L360 132L340 120Z" fill="#1a1a1a"/>
<path d="M360 60L380 48L400 60L400 84L380 96L360 84Z" fill="#1a1a1a"/>
<path d="M380 96L400 84L420 96L420 120L400 132L380 120Z" fill="#1a1a1a"/>
<path d="M400 60L420 48L440 60L440 84L420 96L400 84Z" fill="#1a1a1a"/>
</g>

<!-- Main logomark: stylized enzyme / alpha helix -->
<g transform="translate(240, 100)">
<!-- Front strand -->
<path d="M60 0 C90 10, 120 50, 100 80 C80 110, 50 120, 60 160 C70 200, 110 210, 100 240" fill="none" stroke="#0FB5A2" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
<!-- Back strand -->
<path d="M140 0 C110 10, 80 50, 100 80 C120 110, 150 120, 140 160 C130 200, 90 210, 100 240" fill="none" stroke="#1A7FC4" stroke-width="14" stroke-linecap="round" opacity="0.9"/>

<!-- Hydrogen bonds -->
<line x1="72" y1="30" x2="128" y2="30" stroke="#1A7FC4" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
<line x1="88" y1="75" x2="112" y2="75" stroke="#0FB5A2" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
<line x1="68" y1="120" x2="132" y2="120" stroke="#1A7FC4" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
<line x1="82" y1="165" x2="118" y2="165" stroke="#0FB5A2" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
<line x1="95" y1="210" x2="105" y2="210" stroke="#1A7FC4" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>

<!-- Active site glow -->
<circle cx="100" cy="120" r="28" fill="#0FB5A2" opacity="0.12"/>
<circle cx="100" cy="120" r="18" fill="#0FB5A2" opacity="0.18"/>
<circle cx="100" cy="120" r="8" fill="#0FB5A2" opacity="0.5"/>

<!-- Substrate fragments -->
<g transform="translate(100, 120)">
<circle cx="-38" cy="-14" r="4" fill="#1A7FC4" opacity="0.7"/>
<circle cx="-44" cy="-8" r="3" fill="#0FB5A2" opacity="0.5"/>
<line x1="-36" y1="-12" x2="-42" y2="-7" stroke="#1A7FC4" stroke-width="1.5" opacity="0.4"/>
<circle cx="40" cy="16" r="4" fill="#1A7FC4" opacity="0.7"/>
<circle cx="48" cy="10" r="3" fill="#0FB5A2" opacity="0.5"/>
<line x1="42" y1="14" x2="46" y2="11" stroke="#1A7FC4" stroke-width="1.5" opacity="0.4"/>
</g>
</g>

<!-- PETase text -->
<text x="340" y="394" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="500" letter-spacing="-1">
<tspan fill="#1A7FC4">PET</tspan>
</text>

<!-- Separator -->
<line x1="295" y1="400" x2="385" y2="400" stroke="#0FB5A2" stroke-width="1" opacity="0.5"/>

<!-- Lab text -->
<text x="340" y="414" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="8" fill="#666666">LAB</text>
</svg>
